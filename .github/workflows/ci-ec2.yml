name: CI - EC2 Self Hosted

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-on-ec2:
    runs-on:
      - self-hosted
      - ec2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display EC2 information
        run: |
          echo "Hostname:"
          hostname
          echo ""
          echo "IP Address:"
          hostname -I
          echo ""
          echo "Python Version:"
          python3 --version

      - name: Create Python virtual environment
        run: |
          python3 -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest -v